name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FLUTTER_CHANNEL: stable

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
      - run: flutter config --enable-macos-desktop
      - run: flutter pub get
      - run: flutter build macos --release
      - name: Zip app
        run: |
          cd build/macos/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent OneCalendar.app OneCalendar-macos.zip
      - uses: actions/upload-artifact@v4
        with:
          name: OneCalendar-macos
          path: build/macos/Build/Products/Release/OneCalendar-macos.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
      - run: flutter config --enable-windows-desktop
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Zip app
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath OneCalendar-windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: OneCalendar-windows
          path: OneCalendar-windows.zip
