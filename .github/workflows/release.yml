name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter config --enable-macos-desktop
      - run: flutter pub get
      - run: flutter build macos --release
      - run: |
          cd build/macos/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent neo_toolbox.app NeoToolbox-macos.zip
      - uses: softprops/action-gh-release@v2
        with:
          files: build/macos/Build/Products/Release/NeoToolbox-macos.zip

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter config --enable-windows-desktop
      - run: flutter pub get
      - run: flutter build windows --release
      - run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath NeoToolbox-windows.zip
      - uses: softprops/action-gh-release@v2
        with:
          files: NeoToolbox-windows.zip
