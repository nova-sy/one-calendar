name: neo_toolbox
description: "Neo Toolbox — calendar sync (DingTalk/Tencent Meeting → Feishu), cross-platform."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  dio: ^5.7.0
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.24
  cryptography: ^2.7.0
  path_provider: ^2.1.4
  path: ^1.9.0
  url_launcher: ^6.3.0
  tray_manager: ^0.3.0
  window_manager: ^0.4.3
  intl: ^0.19.0
  xml: ^6.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.20.0
  build_runner: ^2.4.12

flutter:
  uses-material-design: true
  assets:
    - assets/
